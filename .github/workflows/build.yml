name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install
        run: bun install

      - name: Run frontend tests
        run: bun run test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features test-helpers

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs: [test-frontend, test-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Bun install
        run: bun install

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Create portable zip (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $dir = "skill-zoo-portable"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/skill-zoo.exe" "$dir/"
          if (Test-Path "src-tauri/resources/") { Copy-Item "src-tauri/resources/*" "$dir/resources/" -Recurse }
          Compress-Archive -Path $dir -DestinationPath "src-tauri/target/${{ matrix.target }}/release/bundle/Skill-Zoo-${{ github.ref_name }}-Windows-Portable.zip"

      - name: Rename artifacts
        shell: bash
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="${{ github.ref_name }}"

          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              DMG=$(find "$BUNDLE" -name "*.dmg" | head -1)
              mv "$DMG" "$BUNDLE/Skill-Zoo-${VERSION}-macOS-arm64.dmg"
              ;;
            x86_64-apple-darwin)
              DMG=$(find "$BUNDLE" -name "*.dmg" | head -1)
              mv "$DMG" "$BUNDLE/Skill-Zoo-${VERSION}-macOS-x64.dmg"
              ;;
            x86_64-pc-windows-msvc)
              EXE=$(find "$BUNDLE/nsis" -name "*.exe" | head -1)
              mv "$EXE" "$BUNDLE/Skill-Zoo-${VERSION}-Windows.exe"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: skill-zoo-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-aarch64-apple-darwin
          path: artifacts/aarch64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-x86_64-apple-darwin
          path: artifacts/x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-x86_64-pc-windows-msvc
          path: artifacts/windows

      - name: Generate release body
        id: release_body
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          VERSION="${{ github.ref_name }}"
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges ${PREV_TAG}..HEAD)
          fi
          BODY=$(cat RELEASE_BODY.md)
          BODY="${BODY//__VERSION__/$VERSION}"
          BODY="${BODY//__COMMITS__/$COMMITS}"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.release_body.outputs.body }}" \
            $(find artifacts -name "Skill-Zoo-*" -type f)

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download aarch64 artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-aarch64-apple-darwin
          path: artifacts/aarch64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-x86_64-apple-darwin
          path: artifacts/x86_64

      - name: Compute SHA256 and extract version
        id: shas
        run: |
          set -euo pipefail

          ARM_DMG=$(find artifacts/aarch64 -name "*.dmg" -type f | head -1)
          INTEL_DMG=$(find artifacts/x86_64 -name "*.dmg" -type f | head -1)

          if [ -z "$ARM_DMG" ]; then
            echo "ERROR: No DMG found in aarch64 artifacts"
            exit 1
          fi
          if [ -z "$INTEL_DMG" ]; then
            echo "ERROR: No DMG found in x86_64 artifacts"
            exit 1
          fi

          echo "arm_dmg=$ARM_DMG"
          echo "intel_dmg=$INTEL_DMG"
          echo "arm_sha256=$(shasum -a 256 "$ARM_DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_sha256=$(shasum -a 256 "$INTEL_DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: luochang212/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask formula
        run: |
          VERSION="${{ steps.shas.outputs.version }}"
          ARM_SHA="${{ steps.shas.outputs.arm_sha256 }}"
          INTEL_SHA="${{ steps.shas.outputs.intel_sha256 }}"

          cd tap

          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/skill-zoo.rb
          sed -i "/on_arm do/,/end/ s/sha256 \".*\"/sha256 \"$ARM_SHA\"/" Casks/skill-zoo.rb
          sed -i "/on_intel do/,/end/ s/sha256 \".*\"/sha256 \"$INTEL_SHA\"/" Casks/skill-zoo.rb

          echo "Updated Casks/skill-zoo.rb:"
          cat Casks/skill-zoo.rb

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          commit-message: "skill-zoo ${{ steps.shas.outputs.version }}"
          title: "skill-zoo ${{ steps.shas.outputs.version }}"
          body: |
            Auto-generated by skill-zoo CI.

            - **Version:** ${{ steps.shas.outputs.version }}
            - **aarch64 SHA256:** `${{ steps.shas.outputs.arm_sha256 }}`
            - **x86_64 SHA256:** `${{ steps.shas.outputs.intel_sha256 }}`
          branch: skill-zoo-${{ steps.shas.outputs.version }}
          delete-branch: true
