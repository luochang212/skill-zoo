name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Run frontend tests
        run: bun run test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features test-helpers

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs: [test-frontend, test-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: universal-apple-darwin
            os: macos-latest
            rust_targets: "x86_64-apple-darwin,aarch64-apple-darwin"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rust_targets: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache@0.9.1

      - name: Configure sccache
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_CACHE_SIZE=5G" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Bun install
        run: bun install

      - name: Import Apple Developer Certificate
        if: matrix.target == 'universal-apple-darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Extract signing identity
        if: matrix.target == 'universal-apple-darwin'
        run: |
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      - name: Tauri build and sign (macOS, no notarization)
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Notarize macOS app
        if: matrix.target == 'universal-apple-darwin'
        timeout-minutes: 60
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found" >&2
            exit 1
          fi
          echo "Notarizing: $APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" /tmp/notarize.zip

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== Notarization attempt ${attempt}/${max_attempts} ==="
            if xcrun notarytool submit /tmp/notarize.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait; then
              echo "✅ Notarization succeeded"
              xcrun stapler staple "$APP_PATH"
              echo "✅ Stapled"
              rm -f /tmp/notarize.zip
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ Notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "⚠️ Notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Tauri build (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Create portable zip (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Rebuild with portable feature (no updater plugin)
          cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --features portable
          $dir = "skill-zoo-portable"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/skill-zoo.exe" "$dir/"
          if (Test-Path "src-tauri/resources/") { Copy-Item "src-tauri/resources/*" "$dir/" -Recurse }
          Compress-Archive -Path $dir -DestinationPath "src-tauri/target/${{ matrix.target }}/release/bundle/Skill-Zoo-$env:TAG_NAME-Windows-Portable.zip"

      - name: Rename artifacts
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="$TAG_NAME"

          case "${{ matrix.target }}" in
            universal-apple-darwin)
              DMG=$(find "$BUNDLE" -name "*.dmg" | head -1)
              if [ -n "$DMG" ] && [ -f "$DMG" ]; then
                mv "$DMG" "$BUNDLE/Skill-Zoo-${VERSION}-macOS.dmg"
              fi
              ;;
            x86_64-pc-windows-msvc)
              EXE=$(find "$BUNDLE/nsis" -name "*.exe" | head -1)
              if [ -n "$EXE" ] && [ -f "$EXE" ]; then
                mv "$EXE" "$BUNDLE/Skill-Zoo-${VERSION}-Windows.exe"
              fi
              ;;
          esac

      - name: Rename updater artifacts
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="$TAG_NAME"

          case "${{ matrix.target }}" in
            universal-apple-darwin)
              TAR=$(find "$BUNDLE/macos" -name "*.app.tar.gz" 2>/dev/null | head -1)
              if [ -n "$TAR" ] && [ -f "$TAR" ]; then
                mv "$TAR" "$BUNDLE/Skill-Zoo-${VERSION}-macOS.app.tar.gz"
                if [ -f "${TAR}.sig" ]; then
                  mv "${TAR}.sig" "$BUNDLE/Skill-Zoo-${VERSION}-macOS.app.tar.gz.sig"
                fi
              fi
              ;;
            x86_64-pc-windows-msvc)
              EXE_SIG=$(find "$BUNDLE/nsis" -name "*.exe.sig" 2>/dev/null | head -1)
              if [ -n "$EXE_SIG" ] && [ -f "$EXE_SIG" ]; then
                mv "$EXE_SIG" "$BUNDLE/Skill-Zoo-${VERSION}-Windows.exe.sig"
              fi
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: skill-zoo-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-universal-apple-darwin
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-x86_64-pc-windows-msvc
          path: artifacts/windows

      - name: Generate release body
        id: release_body
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          VERSION="$TAG_NAME"
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges ${PREV_TAG}..HEAD)
          fi
          if [ ! -f RELEASE_BODY.md ]; then
            echo "RELEASE_BODY.md not found" >&2
            exit 1
          fi
          BODY=$(cat RELEASE_BODY.md)
          BODY="${BODY//__VERSION__/$VERSION}"
          BODY="${BODY//__COMMITS__/$COMMITS}"
          echo "$BODY" > release-notes.md

      - name: Generate updater manifest
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$TAG_NAME"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MACOS_SIG=$(find artifacts/macos -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)
          WINDOWS_SIG=$(find artifacts/windows -name "*.exe.sig" -type f 2>/dev/null | head -1)

          MACOS_SIG_CONTENT=""
          WINDOWS_SIG_CONTENT=""
          [ -n "$MACOS_SIG" ] && MACOS_SIG_CONTENT=$(cat "$MACOS_SIG")
          [ -n "$WINDOWS_SIG" ] && WINDOWS_SIG_CONTENT=$(cat "$WINDOWS_SIG")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg macos_sig "$MACOS_SIG_CONTENT" \
            --arg macos_url "https://github.com/luochang212/skill-zoo/releases/download/${VERSION}/Skill-Zoo-${VERSION}-macOS.app.tar.gz" \
            --arg windows_sig "$WINDOWS_SIG_CONTENT" \
            --arg windows_url "https://github.com/luochang212/skill-zoo/releases/download/${VERSION}/Skill-Zoo-${VERSION}-Windows.exe" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64": { signature: $macos_sig, url: $macos_url },
                "darwin-aarch64": { signature: $macos_sig, url: $macos_url },
                "windows-x86_64": { signature: $windows_sig, url: $windows_url }
              }
            }' > latest.json

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md \
            $(find artifacts -name "Skill-Zoo-*" -type f) latest.json

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: skill-zoo-universal-apple-darwin
          path: artifacts/macos

      - name: Compute SHA256 and extract version
        id: shas
        run: |
          set -euo pipefail

          DMG=$(find artifacts/macos -name "*.dmg" -type f | head -1)

          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found in macOS artifacts"
            exit 1
          fi

          echo "sha256=$(shasum -a 256 "$DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: luochang212/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask formula
        run: |
          VERSION="${{ steps.shas.outputs.version }}"
          SHA="${{ steps.shas.outputs.sha256 }}"
          cd tap
          cat > Casks/skill-zoo.rb << EOF
          cask "skill-zoo" do
            version "${VERSION}"

            url "https://github.com/luochang212/skill-zoo/releases/download/v#{version}/Skill-Zoo-v#{version}-macOS.dmg"
            sha256 "${SHA}"

            name "Skill Zoo"
            desc "Local GUI tool for managing AI Agent Skills"
            homepage "https://github.com/luochang212/skill-zoo"

            app "skill-zoo.app"

            zap trash: [
              "~/Library/Application Support/com.skillzoo.app",
            ]
          end
          EOF
          echo "Updated Casks/skill-zoo.rb:"
          cat Casks/skill-zoo.rb

      - name: Create or update PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          commit-message: "skill-zoo ${{ steps.shas.outputs.version }}"
          title: "skill-zoo ${{ steps.shas.outputs.version }}"
          body: |
            Auto-generated by skill-zoo CI.

            - **Version:** ${{ steps.shas.outputs.version }}
            - **SHA256:** `${{ steps.shas.outputs.sha256 }}`
          branch: skill-zoo-${{ steps.shas.outputs.version }}
          delete-branch: true
